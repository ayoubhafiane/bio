<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayoub Hafiane</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
        INSTRUCTIONS:
        1. Replace 'background.jpg' in CSS with your own hero/background image.
        2. Edit headline/subtitle below.
        3. Edit social/contact links with your URLs and icons.
        4. Add/remove <img> tags in .gallery for your photos.
    -->
    <div class="hero">
        <div class="hero-content">
            <h1>Ayoub Hafiane: Soft curves, sharp chaos.</h1>
            <p class="hero-desc">
                Moroccan film star. Internet menace.<br>
                Talented, stacked, and dangerously clickable.
            </p>
            <div class="hero-links">
                <a href="https://fansonly.com/" target="_blank" class="hero-btn">
                    <i class="fas fa-camera"></i> <span style="font-size:1.4em;">🍑🌶️</span> <span>Fans Only</span>
                </a>
                <a href="https://tiktok.com/" target="_blank" class="hero-btn">
                    <i class="fab fa-tiktok"></i> <span>TikTok</span>
                </a>
                <a href="https://instagram.com/x.x.ayoub.x.x/" target="_blank" class="hero-btn">
                    <i class="fab fa-instagram"></i> <span>Instagram</span>
                </a>
                <a href="mailto:hafiane.ayoub@gmail.com" class="hero-btn">
                    <i class="fas fa-envelope"></i> <span>Collabs/Inquiries</span>
                </a>
            </div>
        </div>
        <!-- Gallery - one column, hover effect, lightbox -->
        <div class="gallery">
            <img src="image1.jpg" alt="Gallery Image 1" loading="lazy" onclick="openLightbox('image1.jpg')">
            <img src="image2.jpg" alt="Gallery Image 2" loading="lazy" onclick="openLightbox('image2.jpg')">
            <img src="image3.jpg" alt="Gallery Image 3" loading="lazy" onclick="openLightbox('image3.jpg')">
            <img src="image4.jpg" alt="Gallery Image 4" loading="lazy" onclick="openLightbox('image4.jpg')">
            <img src="image5.jpg" alt="Gallery Image 5" loading="lazy" onclick="openLightbox('image5.jpg')">
            <img src="image6.jpg" alt="Gallery Image 6" loading="lazy" onclick="openLightbox('image6.jpg')">
            <img src="image7.jpg" alt="Gallery Image 7" loading="lazy" onclick="openLightbox('image7.jpg')">
            <img src="image8.jpg" alt="Gallery Image 8" loading="lazy" onclick="openLightbox('image8.jpg')">
            <img src="image9.jpg" alt="Gallery Image 9" loading="lazy" onclick="openLightbox('image9.jpg')">
            <img src="image10.jpg" alt="Gallery Image 10" loading="lazy" onclick="openLightbox('image10.jpg')">
            <img src="image11.jpg" alt="Gallery Image 11" loading="lazy" onclick="openLightbox('image11.jpg')">
            <img src="image12.jpg" alt="Gallery Image 12" loading="lazy" onclick="openLightbox('image12.jpg')">
        </div>
    </div>
    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-image" src="" alt="Lightbox Image">
    </div>
    <script src="script.js"></script>
</body>
</html>
